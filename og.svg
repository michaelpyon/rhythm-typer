<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001830"/>
      <stop offset="50%" stop-color="#002848"/>
      <stop offset="100%" stop-color="#000e20"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0cf"/>
      <stop offset="100%" stop-color="#f0a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Light rays -->
  <g opacity="0.06" fill="#4488cc">
    <polygon points="240,0 270,0 360,630 220,630"/>
    <polygon points="500,0 530,0 600,630 460,630"/>
    <polygon points="780,0 810,0 880,630 740,630"/>
    <polygon points="1020,0 1050,0 1120,630 980,630"/>
  </g>

  <!-- Shark silhouette -->
  <g transform="translate(900,360)">
    <ellipse cx="0" cy="0" rx="120" ry="48" fill="#1a3a5a"/>
    <polygon points="100,0 160,-50 130,0 160,40" fill="#1a3a5a"/>
    <polygon points="-15,-48 -30,-10 30,-10" fill="#1a3a5a"/>
    <ellipse cx="-25" cy="20" rx="80" ry="22" fill="#2a5070"/>
    <circle cx="-70" cy="-8" r="5" fill="#fff"/>
    <circle cx="-70" cy="-8" r="2.5" fill="#000"/>
  </g>

  <!-- Title -->
  <text x="80" y="240" font-family="'Segoe UI', Arial, sans-serif" font-size="120" font-weight="900" fill="url(#title)" letter-spacing="-2">RHYTHM</text>
  <text x="80" y="370" font-family="'Segoe UI', Arial, sans-serif" font-size="120" font-weight="900" fill="#0cf" letter-spacing="-2">TYPER</text>

  <!-- Tagline -->
  <text x="80" y="450" font-family="'Segoe UI', Arial, sans-serif" font-size="32" fill="#f0a" font-weight="700" letter-spacing="3">TYPE TO THE BEAT</text>

  <!-- Beat pips -->
  <g transform="translate(80,520)">
    <circle cx="0" cy="0" r="14" fill="#0ff"/>
    <circle cx="40" cy="0" r="14" fill="rgba(255,255,255,0.2)" stroke="#fff" stroke-opacity="0.3" stroke-width="2"/>
    <circle cx="80" cy="0" r="14" fill="rgba(255,255,255,0.2)" stroke="#fff" stroke-opacity="0.3" stroke-width="2"/>
    <circle cx="120" cy="0" r="14" fill="rgba(255,255,255,0.2)" stroke="#fff" stroke-opacity="0.3" stroke-width="2"/>
  </g>

  <!-- Subtitle -->
  <text x="80" y="585" font-family="'Courier New', monospace" font-size="22" fill="#fff" opacity="0.6">PERFECT &gt; GOOD &gt; OK &gt; MISS</text>
</svg>
